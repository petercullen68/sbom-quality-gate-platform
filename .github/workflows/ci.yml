name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build/Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET SDK from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            global.json
            Directory.Packages.props
            **/*.csproj
            **/packages.lock.json

      - name: Verify .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore SbomQualityGate.slnx

      - name: Build
        run: dotnet build SbomQualityGate.slnx --no-restore --configuration Release -warnaserror

      - name: Test UnitTests (TRX + Coverage)
        run: >
          dotnet test tests/UnitTests/UnitTests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=UnitTests.trx"
          --results-directory artifacts/test-results/unit
          --collect "XPlat Code Coverage"

      #  Integration tests are currently disabled 
      #- name: Test IntegrationTests (TRX + Coverage)
      #  run: >
      #    dotnet test tests/IntegrationTests/IntegrationTests.csproj
      #    --no-build
      #    --configuration Release
      #    --verbosity normal
      #    --logger "trx;LogFileName=IntegrationTests.trx"
      #    --results-directory artifacts/test-results/integration
      #    --collect "XPlat Code Coverage"

      - name: Upload test results and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.os }}
          path: |
            artifacts/test-results/**/*.trx
            artifacts/test-results/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 14
